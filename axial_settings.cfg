[Settings]

##############################################################################
# Axial Seamount REDPy Configuration                                         #
# Stations: AXCC1, AXEC1, AXEC2, AXEC3, AXAS1, AXAS2, AXID1                #
##############################################################################

# --- Name / Output ---
title=Axial Seamount Repeating Earthquakes
outputpath=./runs/
groupname=axial
filename=./h5/axial_redpytable.h5

# --- Data Source (local .mat waveform files, read directly - no conversion) ---
server=file
searchdir=/Users/mczhang/Documents/GitHub/Axial-AutoLocate
filepattern=*.mat
preload=5

# --- Station Metadata ---
# Channels verified from .mat file headers (AXCC1/AXEC2 = HHZ; others = EHZ)
nsta=7
station=AXCC1,AXEC1,AXEC2,AXEC3,AXAS1,AXAS2,AXID1
channel=HHZ,EHZ,HHZ,EHZ,EHZ,EHZ,EHZ
network=OO,OO,OO,OO,OO,OO,OO
# Location codes are empty strings in the .mat files
location=,,,,,,

# --- Filtering (OBS: avoid seafloor noise below 2 Hz, target VT events) ---
samprate=100.
fmin=2.
fmax=20.

# --- Frequency Index (must stay within fmin/fmax) ---
filomin=2.
filomax=5.
fiupmin=10.
fiupmax=20.

# --- Triggering ---
trigalg=classicstalta
nstac=4
swin=0.5
lwin=6.
trigon=3.
trigoff=2.

# --- Quality Control ---
kurtwin=5.
kurtmax=80.
kurtfmax=150.
oratiomax=0.2
telefi=-1.5
teleok=4

# --- Cross-Correlation ---
# 256 samples @ 100 Hz = 2.56 sec (covers 80th pct S-P time of 0.38 sec)
winlen=256
cmin=0.7
ncor=4

# --- Orphan Timing ---
minorph=0.05
maxorph=7.

# --- Output ---
printsta=0
plotformat=eqrate,fi,occurrence
minplot=2

# --- External Catalog (Axial is offshore, no ComCat coverage) ---
checkcomcat=False
stalats=45.9540,45.9540,45.9540,45.9540,45.9540,45.9540,45.9540
stalons=-130.009,-130.009,-130.009,-130.009,-130.009,-130.009,-130.009
