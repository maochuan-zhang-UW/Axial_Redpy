[Settings]

##############################################################################
# Axial Seamount REDPy Configuration                                         #
# Stations: AXCC1, AXEC1, AXEC2, AXEC3, AXAS1, AXAS2, AXID1                #
##############################################################################

# --- Name / Output ---
title=Axial Seamount Repeating Earthquakes
outputpath=./runs/
groupname=axial
filename=./h5/axial_redpytable.h5

# --- Data Source (local waveform files) ---
server=file
# UPDATE this to the actual waveform directory on your machine
searchdir=/path/to/your/waveforms/
filepattern=*.mseed
preload=5

# --- Station Metadata ---
# UPDATE network/channel/location to match your actual file headers
# Run: python -c "import obspy; st=obspy.read('yourfile.mseed',headonly=True); [print(tr.stats.network,tr.stats.station,tr.stats.channel,repr(tr.stats.location),tr.stats.sampling_rate) for tr in st]"
nsta=7
station=AXCC1,AXEC1,AXEC2,AXEC3,AXAS1,AXAS2,AXID1
channel=HHZ,HHZ,HHZ,HHZ,HHZ,HHZ,HHZ
network=OO,OO,OO,OO,OO,OO,OO
# Leave blank if location code is empty string in headers; use -- if stored as '--'
location=,,,,,,

# --- Filtering (OBS: avoid seafloor noise below 2 Hz, target VT events) ---
samprate=100.
fmin=2.
fmax=20.

# --- Frequency Index (must stay within fmin/fmax) ---
filomin=2.
filomax=5.
fiupmin=10.
fiupmax=20.

# --- Triggering ---
trigalg=classicstalta
nstac=4
swin=0.5
lwin=6.
trigon=3.
trigoff=2.

# --- Quality Control ---
kurtwin=5.
kurtmax=80.
kurtfmax=150.
oratiomax=0.2
telefi=-1.5
teleok=4

# --- Cross-Correlation ---
winlen=1024
cmin=0.7
ncor=4

# --- Orphan Timing ---
minorph=0.05
maxorph=7.

# --- Output ---
printsta=0
plotformat=png
minplot=2

# --- External Catalog (Axial is offshore, no ComCat coverage) ---
checkcomcat=False
stalats=45.9540,45.9540,45.9540,45.9540,45.9540,45.9540,45.9540
stalons=-130.009,-130.009,-130.009,-130.009,-130.009,-130.009,-130.009
