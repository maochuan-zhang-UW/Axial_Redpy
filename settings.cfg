[Settings]
# Above line is REQUIRED, do not edit!

###############################################################################
#                                                                             #
#                     ~~ Configuration file for REDPy ~~                      #
#                                                                             #
#    Settings not explicitly defined will be assigned a default value, so     #
#    feel free to delete all of the comment lines and any parameters you      #
#    wish to keep at default for a cleaner/simpler configuration file.        #
#                                                                             #
###############################################################################

###########################  NAME / PATH PARAMETERS  ##########################
# title      : Used in the titles of the webpages and plots.                  #
#   default = REDPy Catalog                                                   #
#                                                                             #
# outputpath : Path to the folder that will contain outputs relative to       #
#              current directory, or can be an absolute path. Should end      #
#              with / or \ as appropriate for your operating system.          #
#   default = ./runs/                                                         #
#                                                                             #
# groupname  : Corresponds to folder where outputs are stored.                #
#   default = default                                                         #
#                                                                             #
# filename   : Location to save .h5 file; can be relative or absolute path.   #
#              It is HIGHLY recommended to change the name of this file to    #
#              avoid it being overwritten by accident!                        #
#   default = ./h5/redpytable.h5                                              #
###############################################################################

title=REDPy Catalog
outputpath=./runs/
groupname=default
filename=./h5/redpytable.h5


##########################  DATA SOURCE PARAMETERS  ###########################
# server      : Waveform data source. Accepts any FDSN web service that has   #
#               waveforms client (see obspy.cients.fdsn for full list) or     #
#               a custom server address. Also accepts waveservers, seedlink   #
#               servers, or local files in any format ObsPy can read(). When  #
#               specifying a waveserver or seedlink server, you may also      #
#               specify a port.                                               #
#               Examples:                                                     #
#                   server=IRIS                                               #
#                   server=fdsnws://http://service.iris.edu                   #
#                   server=waveserver://mazama.ess.washington.edu:16024       #
#                   server=seedlink://rtserve.iris.washington.edu:18000       #
#                   server=file                                               #
#   default = IRIS                                                            #
#                                                                             #
# searchdir   : If server=file for local files, specify a path to the top     #
#               directory where the files exist ending in / or \ as           #
#               appropriate for your operating system. Files contained in     #
#               subdirectories within this path will be found.                #
#   default = ./                                                              #
#                                                                             #
# filepattern : Specify a pattern for your files to subset the files searched #
#               in searchdir. Simple wildcarding is supported (i.e., * and ?, #
#               and [] for ranges of values or lists) but not full regular    #
#               expressions.                                                  #
#               Example:                                                      #
#                   filepattern=2019.06.*.mseed                               #
#   default = *                                                               #
#                                                                             #
# preload     : File read operations for large miniseed volumes are slow, so  #
#               speed this up by loading several days of data into memory at  #
#               once. Set to 0 to disable and read from file each iteration.  #
#   default = 10                                                              #
###############################################################################

server=IRIS
searchdir=./
filepattern=*
preload=10.


########################  SENSOR METADATA PARAMETERS  #########################
# nsta     : Number of unique stations/channels.                              #
#   default = 8                                                               #
#                                                                             #
#   NOTE: For lists below, the order corresponds to the order that they will  #
#         be stored and plotted. The order cannot (currently) be changed      #
#         later. Additionally, if you are using local files, the metadata     #
#         (e.g., station code) must match the metadata stored in the header   #
#         perfectly! Location codes can be tricky, where it'll be -- when     #
#         querying the webserver, but empty (e.g., location=,,,,) when using  #
#         downloaded files from that same server.                             #
#                                                                             #
# station  : List of station codes in order of storage preference. No spaces! #
#   default = SEP,YEL,HSR,SHW,EDM,STD,JUN,SOS                                 #
#                                                                             #
# channel  : List of corresponding channels.                                  #
#   default = EHZ,EHZ,EHZ,EHZ,EHZ,EHZ,EHZ,EHZ                                 #
#                                                                             #
# network  : List of corresponding network codes.                             #
#   default = UW,UW,UW,UW,UW,UW,UW,UW                                         #
#                                                                             #
# location : List of corresponding location codes.                            #
#   default = --,--,--,--,--,--,--,--                                         #
#                                                                             #
# offset   : Optional time offset to shift timing of waveforms for each       #
#            sensor/channel to the left in seconds. The way I think of this   #
#            is as a list of arrival times of waves from an expected          #
#            location. Can be used to quickly assess whether an event of      #
#            interest is located near a known point (e.g., beneath the summit #
#            of a volcano or near the mainshock of an aftershock sequence),   #
#            or to bring arrivals from distant stations to be within a short  #
#            correlation window. Be aware that the trigger time used in the   #
#            catalog will also be offset by the smallest value given. If      #
#            used, should have values for each sensor. If not used, can just  #
#            be 0. Example for Mount St. Helens network might be:             #
#                offset=0.00,0.17,0.49,0.60,0.50,0.82,1.09,1.05               #
#   default = 0                                                               #
###############################################################################

nsta=8
station=SEP,YEL,HSR,SHW,EDM,STD,JUN,SOS
channel=EHZ,EHZ,EHZ,EHZ,EHZ,EHZ,EHZ,EHZ
network=UW,UW,UW,UW,UW,UW,UW,UW
location=--,--,--,--,--,--,--,--
offset=0


###########################  FILTERING PARAMETERS  ############################
# sampate    : Sampling rate to store all waveforms at (Hz). Data that are    #
#              not natively at this sampling rate will be resampled. Data are #
#              filtered prior to resampling if you wish to downsample.        #
#   default = 100.                                                            #
#                                                                             #
# fmin       : Lower band for bandpass filter (Hz; two corners, zero phase).  #
#   default = 1.                                                              #
#                                                                             #
# fmax       : Upper band for bandpass filter (Hz).                           #
#   default = 10.                                                             #
###############################################################################

samprate=100.
fmin=1.
fmax=10.


########################  FREQUENCY INDEX PARAMETERS  #########################
#   Frequency index (FI) is the log10 ratio of average spectral amplitude in  #
#   an upper frequency band to average spectral amplitude in a lower          #
#   frequency band. Define the limits of those bands below within the bounds  #
#   of the filtering parameters above.                                        #
#                                                                             #
# filomin    : Lower limit of lower frequency band for FI (Hz).               #
#   default = 1.                                                              #
#                                                                             #
# filomax    : Upper limit of lower frequency band for FI (Hz).               #
#   default = 2.5                                                             #
#                                                                             #
# filupmin   : Lower limit of upper frequency band for FI (Hz).               #
#   default = 5.                                                              #
#                                                                             #
# fiupmax    : Upper limit of upper frequency band for FI (Hz).               #
#   default = 10.                                                             #
###############################################################################

filomin=1.
filomax=2.5
fiupmin=5.
fiupmax=10.


###########################  TRIGGERING PARAMETERS  ###########################
# trigalg : The name of the STA/LTA algorithm supported by ObsPy's network    #
#           coincidence trigger function. Below are some options with some    #
#           suggested values for 'swin', 'swin, 'trigon', and 'trigoff' in    #
#           parentheses:                                                      #
#              'classicstalta' - Classic STA/LTA   (0.7, 8, 3, 2)             #
#              'recstalta'     - Recursive STA/LTA (3,   8, 2, 1.5)           #
#              'delayedstalta' - Delayed STA/LTA   (5,  10, 5, 10)            #
#           For additional details see ObsPy's documentation for              #
#           obspy.signal.trigger.coincidence_trigger() and their triggering   #
#           tutorial.                                                         #
#   default = classicstalta                                                   #
#                                                                             #
# nstac   : Minimum number of stations/channels needed for a coincidence      #
#           trigger. I like using just over half of nsta. Using less allows   #
#           more triggers through, but that may not be real events or are of  #
#           dubious quality. Requiring all stations to trigger is not advised #
#           unless you have 100% uptime on all stations.                      #
#   default = 5                                                               #
#                                                                             #
# swin    : Short time window for STA/LTA in seconds.                         #
#   default = 0.7                                                             #
#                                                                             #
# lwin    : Long time window for STA/LTA in seconds.                          #
#   default = 8                                                               #
#                                                                             #
# trigon  : Trigger on ratio threshold for STA/LTA. Controls sensitivity.     #
#   default = 3.                                                              #
#                                                                             #
# trigoff : Trigger off ratio for STA/LTA. Can control whether two close      #
#           events will have separate triggers. For most 'trigalg' choices,   #
#           should be slightly less than 'trigon'.                            #
#   default = 2.                                                              #
###############################################################################

trigalg=classicstalta
nstac=5
swin=0.7
lwin=8.
trigon=3.
trigoff=2.


########################  QUALITY CONTROL PARAMETERS  #########################
#   Spikes, harmonic noise, and teleseisms are automatically put into the     #
#   'junk' table and never considered as a repeater if they exceed the        #
#   following thresholds. You can view the contents of this table with the    #
#   redpy-plot-junk script and experiment with settings that might be more    #
#   appropriate for your setup.                                               #
#                                                                             #
# kurtwin   : Window length in seconds to calculate kurtosis (sharpness) of   #
#             the waveform for automatic spike removal.                       #
#   default = 5.                                                              #
#                                                                             #
# kurtmax   : Kurtosis threshold within the window which if exceeded will be  #
#             be considered a 'spike' and removed. For a 5 second window,     #
#             values ~80-100 are appropriate, ~130 for 15 seconds, and ~200   #
#             for 25 seconds. Set very high to allow all highly impulsive     #
#             events to pass.                                                 #
#   default = 80.                                                             #
#                                                                             #
# kurtfmax  : Kurtosis threshold for the amplitude spectrum to eliminate      #
#             analog calibration pulses or other unnaturally harmonic         #
#             signals. However, be careful not to set too low or real         #
#             harmonic events may be eliminated.                              #
#   default = 150.                                                            #
#                                                                             #
# oratiomax : Maximum ratio of outliers in kurtosis to the total number of    #
#             data points in the trace. Set to 1. to turn off kurtosis tests  #
#             completely.                                                     #
#   default = 0.2                                                             #
#                                                                             #
# telefi    : Teleseisms are filtered based on their frequency index. This    #
#             value is strongly affected by the frequency index settings      #
#             above! If FI below this value on more than 'teleok' channels it #
#             is flagged as a teleseism.                                      #
#   default = -1.5                                                            #
#                                                                             #
# teleok    : Number of channels allowed to pass the 'telefi' threshold for   #
#             each trigger. Set to be equal to 'nsta' to turn off teleseism   #
#             detection completely.                                           #
#   default = 2                                                               #
###############################################################################

kurtwin=5.
kurtmax=80.
kurtfmax=150.
oratiomax=0.2
telefi=-1.5
teleok=2


#######################  CROSS-CORRELATION PARAMETERS  ########################
# winlen         : Cross-correlation window length in samples (2^n is best).  #
#   default = 1024                                                            #
#                                                                             #
# cmin           : Minimum cross-correlation coefficient to be considered     #
#                  part of a family.                                          #
#   default = 0.7
#                                                                             #
# ncor           : Number of stations/channels that 'cmin' must be exceeded   #
#                  on to be considered part of a family. I recommend setting  #
#                  this to be approximately half of 'nsta'.                   #
#   default = 4                                                               #
#                                                                             #
# use_nthcor     : If True, use and store the cross-correlation value at the  #
#                  'ncor'-th station/channel instead of the maximum across    #
#                  all of them when considering correlation values. May need  #
#                  to increase 'corr_permit' to accomodate reduced values.    #
#   default = False                                                           #
#                                                                             #
# corr_permit    : How much below cmin to permit further checks into a family #
#                  or a misaligned orphan beyond the initial check. Increase  #
#                  to be more permissive of possible matches, but at the cost #
#                  of additional cross-correlation computations.              #
#   default = 0.05                                                            #
#                                                                             #
# corr_nrecent   : Limit the number of correlation operations within a large  #
#                  family to the N most recently added (by repeater ID). This #
#                  and the following limitations allow very large families to #
#                  grow without running into scaling problems. Set all to 0   #
#                  to allow the entire family to be cross-correlated. If more #
#                  than one option is selected, it will begin with N recent,  #
#                  then choose N youngest from the members remaining, then N  #
#                  largest from the members remaining, and will ignore all    #
#                  other members.                                             #
#   recommended = 25                                                          #
#   default = 0                                                               #
#                                                                             #
# corr_nyoungest : Limit the number of correlation operations within a large  #
#                  family to the N youngest (latest event time).              #
#   recommended = 25                                                          #
#   default = 0                                                               #
#                                                                             #
# corr_nlargest  : Limit the number of correlation operations within a large  #
#                  family to the N largest (by mean of stored amplitudes).    #
#   recommended = 50                                                          #
#   default = 0                                                               #
###############################################################################

winlen=1024
cmin=0.7
ncor=4
use_nthcor=False
corr_permit=0.05
corr_nrecent=0
corr_nyoungest=0
corr_nlargest=0


##############################  RUN PARAMETERS  ###############################
# minorph        : Minimum number of days to keep orphans before they expire. #
#   default = 0.05                                                            #
#                                                                             #
# maxorph        : Maximum number of days to keep orphans before they expire. #
#   default = 7.                                                              #
#                                                                             #
# nsec           : Maximum amount of time in seconds to procecss at a time.   #
#   default = 3600                                                            #
#                                                                             #
# max_famlen     : Initial allotted length of family members string in bytes. #
#                  Smaller saves space, but can take extra time if families   #
#                  grow to need more space (must copy into new table).        #
#   default = 30000                                                           #
#                                                                             #
# merge_ratio    : Force OPTICS to find a new core event upon merging two or  #
#                  more families if the largest single family accounts for    #
#                  less than this ratio of the total new family size. Large   #
#                  values help keep the core event relevant but at the cost   #
#                  of computation time. Setting to 1. will always force       #
#                  OPTICS to run (not recommended!), and 0. will only let it  #
#                  run for a subset of total family lengths.                  #
#   recommended = 0.6                                                         #
#   default = 0.                                                              #
#                                                                             #
# always_verbose : If True, always prints additional information without -v   #
#                  or passing verbose=True to functions.                      #
#   default = False                                                           #
###############################################################################

minorph=0.05
maxorph=7.
nsec=3600
max_famlen=30000
merge_ratio=0.
always_verbose=False


############################  TIMELINE PARAMETERS  ############################
# plotformat   : List and order of plots to be included on the Bokeh timeline #
#                separated by either , (new row) or + (group into tabs) and   #
#                without spaces. List of currently supported plot types are:  #
#                eqrate, fi, occurrence (color by rate), occurrencefi (color  #
#                by frequency index) and longevity.                           #
#   default = eqrate,fi,occurrence+occurrencefi,longevity                     #
#                                                                             #
# bokehendtime : Set the reference time for the end of the Bokeh timelines to #
#                either the latest trigger (trigger) or the time that the     #
#                plot was made (now). The trigger option is recommended for   #
#                runs with a finite time span, whereas now may be preferable  #
#                for running as a monitoring tool.                            #
#   default = trigger                                                         #
#                                                                             #
# timeline_vs  : The eqrate timeline shows the number of repeaters with time  #
#                vs. either the number of orphans or the number of triggers.  #
#   default = orphans                                                         #
#                                                                             #
# minplot      : Minimum number of members within a family needed for that    #
#                family to appear on the overview timeline plot.              #
#   default = 5                                                               #
#                                                                             #
# mminplot     : Minimum number of members within a family needed for that    #
#                family to appear on the meta_recent timeline plot.           #
#   default = 0                                                               #
#                                                                             #
# recplot      : Number of days prior to end time to show on overview_recent  #
#                timeline.                                                    #
#   default = 14.                                                             #
#                                                                             #
# mrecplot     : Number of days prior to end time to show on meta_recent      #
#                timeline.                                                    #
#   default = 30.                                                             #
#                                                                             #
# dybin        : Width (in days) of bins for eqrate subplot on overview       #
#                timeline.                                                    #
#   default = 1.                                                              #
#                                                                             #
# hrbin        : Width (in hours) of bins for eqrate subplot on               #
#                overview_recent timeline.                                    #
#   default = 1.                                                              #
#                                                                             #
# mhrbin       : Width (in hours) of bins for eqrate subplot on meta_recent   #
#                timeline.                                                    #
#   default = 1.                                                              #
#                                                                             #
# occurbin     : Width (in hours) of bars in occurrence subplot on overview   #
#                timeline. If this is set for a day or longer, the color bar  #
#                will automatically scale up to a maximum of 1000 events per  #
#                bin. Customize this setting if your run extends >1 year.     #
#   default = 1.                                                              #
#                                                                             #
# recbin       : Width (in hours) of bars in occurrence plot on               #
#                overview_recent timeline.                                    #
#   default = 1.                                                              #
#                                                                             #
# mrecbin      : Width (in hours) of bars in occurrence plot on meta_recent   #
#                timeline.                                                    #
#   default = 1.                                                              #
#                                                                             #
# fixedheight  : If True, fixes the height of the occurrence subplot to have  #
#                the same height as the other subplots. Otherwise, allows the #
#                subplot to grow in height as the number of families grows.   #
#   default = False                                                           #
#                                                                             #
# fispanlow    : Set the lower limit for the color bar for occurrencefi plot. #
#   default = -0.5                                                            #
#                                                                             #
# fispanhigh   : Set the upper limit for the color bar for occurrencefi plot. #
#   default = 0.5                                                             #
#                                                                             #
# anotfile     : Annotation file (see included example_annotation.csv for     #
#                format) to add vertical annotation lines to the timeline     #
#                plots. Leave blank to not use annotations.                   #
#   default =                                                                 #
###############################################################################

plotformat=eqrate,fi,occurrence+occurrencefi,longevity
bokehendtime=trigger
timeline_vs=orphans
minplot=5
mminplot=0
recplot=14.
mrecplot=30.
dybin=1.
hrbin=1.
mhrbin=1.
occurbin=1.
recbin=1.
mrecbin=1.
fixedheight=False
fispanlow=-0.5
fispanhigh=0.5
anotfile=


###########################  FAMILY PLOT PARAMETERS  ##########################
# printsta : Index of station/channel to use for core image plots and for the #
#            amplitude timeline subplot. 0-indexed, so first item is 0!       #
#   default = 2     (corresponds to HSR.EHZ.UW.-- with default SCNL)          #
#                                                                             #
# amplims  : Define amplitude subplot limits based on either the current      #
#            family (family) or across all families (global).                 #
#   default = global                                                          #
###############################################################################

printsta=2
amplims=global


##########################  TEXT CATALOG PARAMETERS  ##########################
# verbosecatalog : If True, print a more verbose version of the catalog with  #
#                  columns for FI, amplitudes, correlation values, etc.       #
#   default = False                                                           #
###############################################################################

verbosecatalog=False


########################  EXTERNAL CATALOG PARAMETERS  ########################
#  NOTE: Settings here apply to many aspects of the Detector.locate() method  #
#  including finding matches when generating family HTML files, using the -q  #
#  option in redpy-catfill, and defining sensor locations for any method that #
#  estimates an arrival time.                                                 #
#                                                                             #
# checkcomcat : If True, will search the ANSS Comprehensive Catalog (ComCat)  #
#               for potential located seismicity that has arrival times that  #
#               are consistent with the trigger time of repeaters, and, if    #
#               found, will write those matches to the end of the family HTML #
#               file with a map if at least one match is local to the study   #
#               area.                                                         #
#   default = False                                                           #
#                                                                             #
# datacenter  : Allows an alternate FDSN datacenter to be queried if it has   #
#               an 'event' option. 'USGS' is ComCat.                          #
#   default = USGS                                                            #
#                                                                             #
# stalats     : Station latitudes as a list. Can also be a single value near  #
#               the center of your network.                                   #
#   default = 46.200210,46.209550,46.174280,46.193470,46.197170,46.237610,    #
#             46.147060,46.243860                                             #
#                                                                             #
# stalons     : Station longitudes as a list. Same as above.                  #
#   default = -122.190600,-122.188990,-122.180650,-122.236350,-122.151210,    #
#             -122.223960,-122.152430,-122.137870                             #
#                                                                             #
# serr        : Seconds of error allowed between a trigger and possible       #
#               arrival time to still be considered a match.                  #
#   default = 5.                                                              #
#                                                                             #
# locdeg      : Distance in degrees to search for local matches.              #
#   default = 0.5                                                             #
#                                                                             #
# regdeg      : Distance in degrees to search for regional matches.           #
#   default = 2.                                                              #
#                                                                             #
# regmag      : Minimum magnitude to search for regional matches.             #
#   default = 2.5                                                             #
#                                                                             #
# telemag     : Minimum magnitude to search for teleseismic matches.          #
#   default = 4.5                                                             #
#                                                                             #
# matchmax    : Maximum number of repeaters to try to match to catalog, in    #
#               order of descending amplitude on 'printsta' station/channel.  #
#               0 matches all. I like 50 as a tradeoff between matching       #
#               everything in most families and limiting the amount of time   #
#               spent trying to match everything in extremely large families  #
#               with 1000+ members.                                           #
#   recommended = 50                                                          #
#   default = 0                                                               #
###############################################################################

checkcomcat=False
datacenter=USGS
stalats=46.200210,46.209550,46.174280,46.193470,46.197170,46.237610,46.147060,46.243860
stalons=-122.190600,-122.188990,-122.180650,-122.236350,-122.151210,-122.223960,-122.152430,-122.137870
serr=5.
locdeg=0.5
regdeg=2.
regmag=2.5
telemag=4.5
matchmax=0
